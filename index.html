<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LabMaster Global Offline Pro</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b1220; --card:#111c33; --muted:#1e293b; --accent:#38bdf8;
  --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,Helvetica,sans-serif;background:var(--bg);color:#fff}
header{background:var(--card);padding:14px;text-align:center;font-weight:bold;color:var(--accent)}
.wrap{padding:12px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.card{background:var(--card);padding:12px;border-radius:10px}
input,select,textarea{width:100%;padding:10px;margin-top:6px;border-radius:6px;border:none}
button{width:100%;padding:10px;margin-top:8px;border:none;border-radius:6px;background:var(--ok);color:#fff;font-weight:bold;cursor:pointer}
button.secondary{background:#64748b}
button.warn{background:var(--warn)}
button.danger{background:var(--bad)}
button:hover{filter:brightness(.95)}
.list .item{background:var(--muted);padding:10px;margin-top:8px;border-radius:8px;cursor:pointer}
.list .item:hover{background:#273556}
.top{display:flex;gap:10px;justify-content:center;margin-bottom:8px}
.box{background:var(--muted);padding:8px 14px;border-radius:8px;text-align:center}
.small{opacity:.8;font-size:12px}
.badge{padding:2px 6px;border-radius:6px;font-size:12px;margin-left:6px}
.b-ok{background:rgba(34,197,94,.2);color:#22c55e}
.b-warn{background:rgba(245,158,11,.2);color:#f59e0b}
.b-bad{background:rgba(239,68,68,.2);color:#ef4444}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.8)}
.modal .boxm{background:var(--card);padding:14px;border-radius:10px;width:95%;max-width:560px;max-height:90vh;overflow:auto}
.row{display:flex;gap:6px}
.row > *{flex:1}
hr{border:0;border-top:1px solid #2a3554;margin:10px 0}
label{display:block;margin-top:6px}
.inline{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px}
.inline label{background:#0f172a;padding:6px 8px;border-radius:6px}
pre{white-space:pre-wrap}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="modal" style="display:flex">
  <div class="boxm">
    <h3>LabMaster Login</h3>
    <input id="u" placeholder="Username">
    <input id="p" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <div class="small">Demo: admin / 1234</div>
  </div>
</div>

<header>🧪 LabMaster Global — Offline Pro</header>

<div class="wrap" id="app" style="display:none">

  <!-- DASH -->
  <div class="top">
    <div class="box">Patients<br><b id="pc">0</b></div>
    <div class="box">Tests<br><b id="tc">0</b></div>
  </div>

  <div class="grid">

    <!-- ADD PATIENT -->
    <div class="card">
      <h3>Add Patient</h3>
      <input id="name" placeholder="Name">
      <div class="row">
        <input id="age" placeholder="Age">
        <select id="gender">
          <option>Male</option>
          <option>Female</option>
        </select>
      </div>
      <input id="pid" placeholder="Patient ID (optional)">
      <button onclick="addPatient()">Save Patient</button>
      <button class="secondary" onclick="exportData()">Backup (Export JSON)</button>
      <input type="file" accept="application/json" onchange="importData(event)">
    </div>

    <!-- LIST -->
    <div class="card">
      <h3>Patients</h3>
      <input id="search" onkeyup="render()" placeholder="Search by name or ID">
      <div id="list" class="list"></div>
    </div>

  </div>
</div>

<!-- MODAL PATIENT -->
<div id="modal" class="modal">
  <div class="boxm">
    <h3 id="mname"></h3>
    <div class="small" id="meta"></div>

    <hr>

    <h4>Select Tests</h4>
    <div class="inline" id="checks"></div>

    <h4>Enter Results</h4>
    <div id="inputs"></div>

    <button onclick="addTests()">Save Selected Tests</button>
    <button class="secondary" onclick="printReport()">Print Report</button>
    <button class="secondary" onclick="closeM()">Close</button>

    <hr>
    <div id="tests"></div>
  </div>
</div>

<script>
/* ===== AUTH ===== */
function login(){
  const u=document.getElementById('u').value;
  const p=document.getElementById('p').value;
  if(u==='admin' && p==='1234'){
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
  } else alert('Wrong login');
}

/* ===== STORAGE ===== */
const KEY='lab_offline_pro_v2';
let patients=JSON.parse(localStorage.getItem(KEY)||'[]');
let currentIndex=null;

/* ===== TEST CATALOG ===== */
const TESTS = [
  /* CBC */
  {name:'Hemoglobin', unit:'g/dL', min:12, max:17},
  {name:'WBC', unit:'10^3/uL', min:4, max:11},
  {name:'RBC', unit:'10^6/uL', min:4, max:6},
  {name:'Platelets', unit:'10^3/uL', min:150, max:450},

  /* BIO */
  {name:'Glucose', unit:'mg/dL', min:70, max:110},
  {name:'Urea', unit:'mg/dL', min:15, max:45},
  {name:'Creatinine', unit:'mg/dL', min:0.6, max:1.3},
  {name:'Cholesterol', unit:'mg/dL', min:0, max:200},

  /* LIVER */
  {name:'ALT', unit:'U/L', min:7, max:56},
  {name:'AST', unit:'U/L', min:10, max:40},

  /* HORMONES */
  {name:'TSH', unit:'mIU/L', min:0.4, max:4.0},

  /* TEXT REPORTS */
  {name:'Urine Analysis', type:'urine'},
  {name:'Stool Analysis', type:'stool'},
  {name:'Semen Analysis', type:'semen'}
];

/* ===== HELPERS ===== */
function save(){ localStorage.setItem(KEY, JSON.stringify(patients)); }
function badge(val, t){
  if(t.min==null || t.max==null || val==='' || isNaN(val)) return '';
  const v=parseFloat(val);
  if(v<t.min) return `<span class="badge b-warn">Low</span>`;
  if(v>t.max) return `<span class="badge b-bad">High</span>`;
  return `<span class="badge b-ok">Normal</span>`;
}

/* ===== PATIENT ===== */
function addPatient(){
  const name=document.getElementById('name').value.trim();
  const age=document.getElementById('age').value.trim();
  const gender=document.getElementById('gender').value;
  const pid=document.getElementById('pid').value.trim() || ('P'+Date.now());
  if(!name) return alert('Enter name');

  patients.push({name,age,gender,pid,tests:[],created:new Date().toLocaleString()});
  document.getElementById('name').value='';
  document.getElementById('age').value='';
  document.getElementById('pid').value='';
  save(); render();
}

function render(){
  const q=(document.getElementById('search').value||'').toLowerCase();
  const list=document.getElementById('list');
  list.innerHTML='';
  let tcount=0;

  patients.filter(p => (p.name+p.pid).toLowerCase().includes(q))
  .forEach((p,i)=>{
    tcount += p.tests.length;
    list.innerHTML += `
      <div class="item" onclick="openP(${i})">
        <b>${p.name}</b> <span class="small">#${p.pid}</span><br>
        ${p.gender} | Age: ${p.age} | Tests: ${p.tests.length}
      </div>`;
  });

  document.getElementById('pc').innerText=patients.length;
  document.getElementById('tc').innerText=tcount;
}

/* ===== MODAL ===== */
function openP(i){
  currentIndex=i;
  const p=patients[i];
  document.getElementById('modal').style.display='flex';
  document.getElementById('mname').innerText = p.name + ' (#'+p.pid+')';
  document.getElementById('meta').innerText = `Age: ${p.age} | Gender: ${p.gender}`;
  buildChecks();
  showTests();
}

function closeM(){ document.getElementById('modal').style.display='none'; }

/* ===== BUILD FORMS ===== */
function buildChecks(){
  const c=document.getElementById('checks');
  const inputs=document.getElementById('inputs');
  c.innerHTML=''; inputs.innerHTML='';

  TESTS.forEach((t,idx)=>{
    const id='t_'+idx;
    c.innerHTML += `<label><input type="checkbox" id="${id}" value="${idx}"> ${t.name}</label>`;

    if(t.type==='urine'){
      inputs.innerHTML += `
      <div id="in_${idx}" style="display:none">
      <label>Urine Analysis</label>
      <textarea id="val_${idx}" placeholder="Color:
Appearance:
pH:
RBC:
WBC:
Bacteria:
Crystals:
Others:"></textarea>
      </div>`;
    }
    else if(t.type==='stool'){
      inputs.innerHTML += `
      <div id="in_${idx}" style="display:none">
      <label>Stool Analysis</label>
      <textarea id="val_${idx}" placeholder="Color:
Consistency:
RBC:
WBC:
Parasites:
Others:"></textarea>
      </div>`;
    }
    else if(t.type==='semen'){
      inputs.innerHTML += `
      <div id="in_${idx}" style="display:none">
      <label>Semen Analysis</label>
      <textarea id="val_${idx}" placeholder="Volume:
Count:
Motility:
Morphology:
pH:
Others:"></textarea>
      </div>`;
    }
    else{
      inputs.innerHTML += `
      <div id="in_${idx}" style="display:none">
      <label>${t.name} (${t.unit}) [${t.min}-${t.max}]</label>
      <div class="row">
      <input id="val_${idx}" placeholder="Value">
      <input id="note_${idx}" placeholder="Note">
      </div>
      </div>`;
    }

    document.addEventListener('change',e=>{
      if(e.target.id===id){
        document.getElementById('in_'+idx).style.display = e.target.checked?'block':'none';
      }
    });
  });
}

/* ===== ADD TESTS ===== */
function addTests(){
  const p=patients[currentIndex];
  let any=false;

  TESTS.forEach((t,idx)=>{
    const cb=document.getElementById('t_'+idx);
    if(cb && cb.checked){
      any=true;
      const val=document.getElementById('val_'+idx).value;

      p.tests.push({
        name:t.name,
        value:val,
        unit:t.unit,
        min:t.min,
        max:t.max,
        date:new Date().toLocaleString()
      });

      cb.checked=false;
      document.getElementById('in_'+idx).style.display='none';
      document.getElementById('val_'+idx).value='';
    }
  });

  if(!any) return alert('Select test');
  save(); showTests(); render();
}

/* ===== SHOW ===== */
function showTests(){
  const p=patients[currentIndex];
  const box=document.getElementById('tests');
  box.innerHTML='';

  p.tests.forEach(x=>{
    if(x.unit){
      box.innerHTML += `
      <div class="item">
        <b>${x.name}</b>
        ${badge(x.value, x)}
        <div>${x.value} ${x.unit}</div>
      </div>`;
    }else{
      box.innerHTML += `
      <div class="item">
        <b>${x.name}</b>
        <pre>${x.value}</pre>
      </div>`;
    }
  });
}

/* ===== PRINT ===== */
function printReport(){
  const p=patients[currentIndex];
  const w=window.open();

  w.document.write(`<h2>Lab Report</h2><p>${p.name}</p><hr>`);

  p.tests.forEach(x=>{
    if(x.unit){
      w.document.write(`<p>${x.name}: ${x.value} ${x.unit}</p>`);
    }else{
      w.document.write(`<pre>${x.value}</pre>`);
    }
  });

  w.print();
}

/* ===== BACKUP ===== */
function exportData(){
  const blob = new Blob([JSON.stringify(patients,null,2)], {type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='backup.json';
  a.click();
}
function importData(e){
  const f=e.target.files[0];
  if(!f) return;
  const r=new FileReader();
  r.onload=()=>{
    patients=JSON.parse(r.result);
    save(); render();
  };
  r.readAsText(f);
}

render();
</script>

</body>
</html>
