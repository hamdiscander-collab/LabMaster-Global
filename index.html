<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AI Hospital System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
header{padding:12px;text-align:center;background:#111c33;color:#38bdf8}
.wrap{padding:10px}
.card{background:#111c33;padding:12px;margin-bottom:10px;border-radius:10px}
input,button{width:100%;padding:10px;margin-top:6px;border:none;border-radius:6px}
button{background:#22c55e;color:#fff;font-weight:bold}
.alert{color:#ef4444;font-weight:bold}
.ok{color:#22c55e}
</style>
</head>

<body>

<header>🧠 AI Smart Hospital System</header>

<div class="wrap">

  <div class="card">
    <h3>AI Dashboard</h3>
    <div id="dash">Loading...</div>
  </div>

  <div class="card">
    <h3>Add Patient</h3>
    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <button onclick="addPatient()">Add</button>
  </div>

  <div class="card">
    <h3>Lab Test (AI Analysis)</h3>

    <input id="hb" placeholder="Hemoglobin">
    <input id="wbc" placeholder="WBC">
    <input id="glucose" placeholder="Glucose">
    <input id="creatinine" placeholder="Creatinine">

    <button onclick="sendLab()">Analyze</button>

    <div id="result"></div>
  </div>

</div>

<script>

const API="https://labmaster-global3.onrender.com";

/* ===== DASHBOARD ===== */
async function loadDash(){
  const res=await fetch(API+"/ai/dashboard/admin");
  const data=await res.json();

  document.getElementById("dash").innerHTML=`
    Total Labs: ${data.totalLabs}<br>
    Critical Cases: ${data.criticalCases}<br>
    Status: <b>${data.status}</b>
  `;
}

/* ===== PATIENT ===== */
async function addPatient(){
  await fetch(API+"/patient",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user:"admin",
      patient:{
        name:document.getElementById("name").value,
        age:document.getElementById("age").value
      }
    })
  });

  alert("Patient Added");
}

/* ===== AI LAB ===== */
async function sendLab(){

  const results={
    hb:parseFloat(document.getElementById("hb").value),
    wbc:parseFloat(document.getElementById("wbc").value),
    glucose:parseFloat(document.getElementById("glucose").value),
    creatinine:parseFloat(document.getElementById("creatinine").value)
  };

  const res=await fetch(API+"/lab",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      user:"admin",
      patientId:1,
      results
    })
  });

  const data=await res.json();

  document.getElementById("result").innerHTML=`
    <div class="alert">Alerts: ${data.ai.alerts.join(", ")}</div>
    <div>Diagnosis: ${data.ai.diagnosis.join(", ")}</div>
  `;
}

loadDash();

</script>

</body>
</html>
