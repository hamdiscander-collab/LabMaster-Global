<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LabMaster Global v2</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

/* LOGIN */
#loginBox{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:flex;
justify-content:center;
align-items:center;
background:#0b1220;
}

.login{
background:#111c33;
padding:20px;
border-radius:10px;
width:300px;
}

/* HEADER */
header{
background:#111c33;
padding:15px;
text-align:center;
font-size:20px;
color:#38bdf8;
}

/* DASH */
.dashboard{
display:flex;
gap:10px;
padding:10px;
justify-content:center;
}
.box{
background:#1e293b;
padding:10px;
border-radius:8px;
min-width:120px;
text-align:center;
}

/* LAYOUT */
.container{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
padding:15px;
}

.card{
background:#111c33;
padding:15px;
border-radius:10px;
}

/* INPUT */
input,textarea,select{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:6px;
}

/* BUTTON */
button{
width:100%;
padding:10px;
margin-top:8px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{background:#16a34a}

/* PATIENT */
.patient{
background:#1f2a44;
padding:10px;
margin-top:10px;
border-radius:8px;
cursor:pointer;
}

.patient:hover{background:#273556}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
display:none;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.modal-content{
background:#111c33;
padding:15px;
width:400px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox">
<div class="login">
<h3>LabMaster Login</h3>
<input id="user" placeholder="Username">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>
</div>

<!-- APP -->
<div id="app" style="display:none">

<header>🧪 LabMaster Global v2</header>

<div class="dashboard">
<div class="box">Patients <div id="pc">0</div></div>
<div class="box">Tests <div id="tc">0</div></div>
</div>

<div class="container">

<!-- ADD -->
<div class="card">
<h3>Add Patient</h3>
<input id="name" placeholder="Name">
<input id="age" placeholder="Age">
<select id="gender">
<option>Male</option>
<option>Female</option>
</select>

<select id="category">
<option>CBC</option>
<option>Biochemistry</option>
<option>Hormones</option>
<option>Urine</option>
</select>

<button onclick="addPatient()">Save Patient</button>
</div>

<!-- LIST -->
<div class="card">
<h3>Patients</h3>
<input id="search" onkeyup="render()" placeholder="Search">

<div id="list"></div>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-content">

<h3 id="mname"></h3>

<input id="test" placeholder="Test">
<textarea id="result" placeholder="Result"></textarea>

<button onclick="addTest()">Add Test</button>
<button onclick="printP()">Print</button>
<button onclick="closeM()">Close</button>

<div id="tests"></div>

</div>
</div>

</div>

<script>

/* USERS (simple demo) */
function login(){
let u=document.getElementById("user").value;
let p=document.getElementById("pass").value;

if(u==="admin" && p==="1234"){
document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";
}
else alert("Wrong login");
}

/* DATA */
let patients=JSON.parse(localStorage.getItem("lab_v2"))||[];
let current=null;

/* SAVE */
function save(){
localStorage.setItem("lab_v2",JSON.stringify(patients));
}

/* ADD */
function addPatient(){
let name=name=document.getElementById("name").value;
let age=document.getElementById("age").value;
let gender=document.getElementById("gender").value;
let category=document.getElementById("category").value;

if(!name)return;

patients.push({
name,age,gender,category,
tests:[]
});

save();
render();
}

/* RENDER */
function render(){
let list=document.getElementById("list");
let s=document.getElementById("search").value.toLowerCase();
list.innerHTML="";

let tcount=0;

patients.filter(p=>p.name.toLowerCase().includes(s))
.forEach((p,i)=>{
tcount+=p.tests.length;

list.innerHTML+=`
<div class="patient" onclick="openP(${i})">
<b>${p.name}</b><br>
${p.category} | ${p.gender}<br>
Tests: ${p.tests.length}
</div>`;
});

document.getElementById("pc").innerText=patients.length;
document.getElementById("tc").innerText=tcount;
}

/* OPEN */
function openP(i){
current=i;
document.getElementById("modal").style.display="flex";
document.getElementById("mname").innerText=patients[i].name;
showTests();
}

/* TEST */
function addTest(){
let t=document.getElementById("test").value;
let r=document.getElementById("result").value;

patients[current].tests.push({
t,r,date:new Date().toLocaleString()
});

save();
showTests();
render();
}

/* SHOW */
function showTests(){
let box=document.getElementById("tests");
box.innerHTML="";

patients[current].tests.forEach(x=>{
box.innerHTML+=`
<div style="background:#1f2a44;margin-top:5px;padding:8px;border-radius:6px">
<b>${x.t}</b><br>${x.r}<br><small>${x.date}</small>
</div>`;
});
}

/* PRINT */
function printP(){
let p=patients[current];
let w=window.open();
w.document.write(`<h1>${p.name}</h1><hr>`);

p.tests.forEach(x=>{
w.document.write(`<p><b>${x.t}</b> - ${x.r}</p>`);
});

w.print();
}

/* CLOSE */
function closeM(){
document.getElementById("modal").style.display="none";
}

render();

</script>

</body>
</html>
