<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>LabMaster Global - Pi Version</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
:root{
  --bg:#0b1220; --card:#111c33; --muted:#1e293b; --accent:#38bdf8;
  --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial;background:var(--bg);color:#fff}
header{background:var(--card);padding:14px;text-align:center;color:var(--accent)}
.wrap{padding:12px}
.card{background:var(--card);padding:12px;border-radius:10px}
button{width:100%;padding:12px;margin-top:10px;border:none;border-radius:6px;background:var(--ok);color:#fff;font-weight:bold}
input{width:100%;padding:10px;margin-top:6px;border-radius:6px;border:none}
.modal{position:fixed;inset:0;display:none;align-items:center;justify-content:center;background:rgba(0,0,0,.8)}
.boxm{background:var(--card);padding:20px;border-radius:10px;text-align:center}
</style>
</head>

<body>

<!-- LOADING -->
<div id="loader" style="position:fixed;inset:0;background:#0b1220;display:flex;align-items:center;justify-content:center;color:#38bdf8;font-size:20px;z-index:9999;">
Loading LabMaster...
</div>

<!-- LOGIN -->
<div id="login" class="modal">
  <div class="boxm">
    <h2>LabMaster Login</h2>
    <button onclick="loginWithPi()" style="background:#facc15;color:#000">
      🔐 Login with Pi
    </button>
    <p class="small">Secure access via Pi Network</p>
  </div>
</div>

<header>🧪 LabMaster (Pi Edition)</header>

<div class="wrap" id="app" style="display:none">
  <div class="card">
    <h3 id="welcome">Welcome</h3>
    <input id="name" placeholder="Patient Name">
    <button onclick="addPatient()">Add Patient</button>
  </div>

  <div class="card" style="margin-top:10px">
    <h3>Patients</h3>
    <div id="list"></div>
  </div>
</div>

<script src="https://sdk.minepi.com/pi-sdk.js"></script>

<script>
/* ===== INIT ===== */
window.addEventListener("load", () => {
  setTimeout(() => {
    document.getElementById("loader").style.display="none";

    const user = localStorage.getItem("pi_user");

    if(user){
      startApp(JSON.parse(user));
    } else {
      document.getElementById("login").style.display="flex";
    }

  }, 500);
});

/* ===== PI INIT ===== */
try {
  Pi.init({ version: "2.0" });
} catch(e){
  console.log("Pi not available");
}

/* ===== LOGIN ===== */
async function loginWithPi(){
  try{
    const auth = await Pi.authenticate(['username'], function(){});
    const user = auth.user;

    localStorage.setItem("pi_user", JSON.stringify(user));
    startApp(user);

  }catch(e){
    alert("Login failed");
  }
}

/* ===== START APP ===== */
function startApp(user){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  document.getElementById("welcome").innerText = "Welcome " + user.username;
  render();
}

/* ===== DATA ===== */
let patients = JSON.parse(localStorage.getItem("patients")||"[]");

function save(){
  localStorage.setItem("patients", JSON.stringify(patients));
}

/* ===== ADD ===== */
function addPatient(){
  const name = document.getElementById("name").value;
  if(!name) return alert("Enter name");

  patients.push({name});
  document.getElementById("name").value="";
  save();
  render();
}

/* ===== RENDER ===== */
function render(){
  const list = document.getElementById("list");
  list.innerHTML="";
  patients.forEach(p=>{
    list.innerHTML += "<div style='background:#1e293b;padding:10px;margin-top:5px;border-radius:6px'>"+p.name+"</div>";
  });
}
</script>

</body>
</html>
